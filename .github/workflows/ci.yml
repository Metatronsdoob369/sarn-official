name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npx tsc --noEmit

    - name: Agent Quality Gate (Lint)
      run: npm run lint

    - name: Agent Quality Gate (Build)
      run: npm run build

    # Ready for Automated Agent Deployment
